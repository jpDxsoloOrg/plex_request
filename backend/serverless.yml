service: plex-request-api

frameworkVersion: '4'

plugins:
  - serverless-offline

provider:
  name: aws
  runtime: nodejs22.x
  region: us-east-1
  stage: ${opt:stage, 'devtest'}
  memorySize: 256
  timeout: 29
  environment:
    REQUESTS_TABLE: ${self:service}-${self:provider.stage}-requests
    SETTINGS_TABLE: ${self:service}-${self:provider.stage}-settings
    ISSUES_TABLE: ${self:service}-${self:provider.stage}-issues
    LIBRARY_TABLE: ${self:service}-${self:provider.stage}-library
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
    RADARR_BASE_URL: ${env:RADARR_BASE_URL, 'http://jpcoder.duckdns.org:7878'}
    RADARR_API_KEY: ${env:RADARR_API_KEY, ''}
    SONARR_BASE_URL: ${env:SONARR_BASE_URL, 'http://jpcoder.duckdns.org:8989'}
    SONARR_API_KEY: ${env:SONARR_API_KEY, ''}
    SABNZBD_BASE_URL: ${env:SABNZBD_BASE_URL, 'http://jpcoder.duckdns.org:38080'}
    SABNZBD_API_KEY: ${env:SABNZBD_API_KEY, ''}
    SENDER_EMAIL: ${env:SENDER_EMAIL, 'noreply@jpdxsolo.com'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchWriteItem
          Resource:
            - !GetAtt RequestsTable.Arn
            - !Join ['/', [!GetAtt RequestsTable.Arn, 'index/*']]
            - !GetAtt SettingsTable.Arn
            - !GetAtt IssuesTable.Arn
            - !Join ['/', [!GetAtt IssuesTable.Arn, 'index/*']]
            - !GetAtt LibraryTable.Arn
        - Effect: Allow
          Action:
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminAddUserToGroup
            - cognito-idp:ListUsers
          Resource: !GetAtt CognitoUserPool.Arn
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: "arn:aws:ses:us-east-1:435238036810:identity/*"
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowCredentials: false
    authorizers:
      jwtAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !Sub https://cognito-idp.${self:provider.region}.amazonaws.com/${CognitoUserPool}
        audience:
          - !Ref CognitoUserPoolClient

custom:
  serverless-offline:
    httpPort: 3001
    noPrependStageInUrl: false

functions:
  # Auth endpoints (public)
  authSignup:
    handler: functions/auth/signup.handler
    events:
      - httpApi:
          path: /auth/signup
          method: POST

  authConfirm:
    handler: functions/auth/confirm.handler
    events:
      - httpApi:
          path: /auth/confirm
          method: POST

  authLogin:
    handler: functions/auth/login.handler
    events:
      - httpApi:
          path: /auth/login
          method: POST

  authRefresh:
    handler: functions/auth/refresh.handler
    events:
      - httpApi:
          path: /auth/refresh
          method: POST

  authMe:
    handler: functions/auth/me.handler
    events:
      - httpApi:
          path: /auth/me
          method: GET
          authorizer:
            name: jwtAuthorizer

  # Search (authenticated)
  search:
    handler: functions/search/search.handler
    events:
      - httpApi:
          path: /search
          method: GET
          authorizer:
            name: jwtAuthorizer

  # Requests (authenticated)
  createRequest:
    handler: functions/requests/create.handler
    events:
      - httpApi:
          path: /requests
          method: POST
          authorizer:
            name: jwtAuthorizer

  getRequests:
    handler: functions/requests/list.handler
    events:
      - httpApi:
          path: /requests
          method: GET
          authorizer:
            name: jwtAuthorizer

  getRequest:
    handler: functions/requests/get.handler
    events:
      - httpApi:
          path: /requests/{id}
          method: GET
          authorizer:
            name: jwtAuthorizer

  checkMedia:
    handler: functions/requests/check.handler
    events:
      - httpApi:
          path: /requests/check
          method: GET
          authorizer:
            name: jwtAuthorizer

  deleteRequest:
    handler: functions/requests/delete.handler
    events:
      - httpApi:
          path: /requests/{id}
          method: DELETE
          authorizer:
            name: jwtAuthorizer

  # Admin requests (admin)
  adminGetRequests:
    handler: functions/admin/requests/list.handler
    events:
      - httpApi:
          path: /admin/requests
          method: GET
          authorizer:
            name: jwtAuthorizer

  adminUpdateRequestStatus:
    handler: functions/admin/requests/updateStatus.handler
    events:
      - httpApi:
          path: /admin/requests/{id}/status
          method: PUT
          authorizer:
            name: jwtAuthorizer

  adminDeleteRequest:
    handler: functions/admin/requests/delete.handler
    events:
      - httpApi:
          path: /admin/requests/{id}
          method: DELETE
          authorizer:
            name: jwtAuthorizer

  adminGetRequestStats:
    handler: functions/admin/requests/stats.handler
    events:
      - httpApi:
          path: /admin/requests/stats
          method: GET
          authorizer:
            name: jwtAuthorizer

  # Admin settings (admin)
  adminGetSettings:
    handler: functions/admin/settings/get.handler
    events:
      - httpApi:
          path: /admin/settings
          method: GET
          authorizer:
            name: jwtAuthorizer

  adminUpdateSetting:
    handler: functions/admin/settings/update.handler
    events:
      - httpApi:
          path: /admin/settings/{key}
          method: PUT
          authorizer:
            name: jwtAuthorizer

  adminTestConnection:
    handler: functions/admin/settings/testConnection.handler
    events:
      - httpApi:
          path: /admin/settings/test/{key}
          method: POST
          authorizer:
            name: jwtAuthorizer

  adminGetProfiles:
    handler: functions/admin/settings/getProfilesAndFolders.profilesHandler
    events:
      - httpApi:
          path: /admin/settings/{key}/profiles
          method: GET
          authorizer:
            name: jwtAuthorizer

  adminGetLanguageProfiles:
    handler: functions/admin/settings/getProfilesAndFolders.languageProfilesHandler
    events:
      - httpApi:
          path: /admin/settings/{key}/language-profiles
          method: GET
          authorizer:
            name: jwtAuthorizer

  adminGetFolders:
    handler: functions/admin/settings/getProfilesAndFolders.foldersHandler
    events:
      - httpApi:
          path: /admin/settings/{key}/folders
          method: GET
          authorizer:
            name: jwtAuthorizer

  # Issues (authenticated user)
  createIssue:
    handler: functions/issues/create.handler
    events:
      - httpApi:
          path: /issues
          method: POST
          authorizer:
            name: jwtAuthorizer

  listIssues:
    handler: functions/issues/list.handler
    events:
      - httpApi:
          path: /issues
          method: GET
          authorizer:
            name: jwtAuthorizer

  deleteIssue:
    handler: functions/issues/delete.handler
    events:
      - httpApi:
          path: /issues/{id}
          method: DELETE
          authorizer:
            name: jwtAuthorizer

  getEpisodes:
    handler: functions/issues/episodes.handler
    events:
      - httpApi:
          path: /issues/episodes
          method: GET
          authorizer:
            name: jwtAuthorizer

  # Library cache (authenticated — used by Report Issue)
  listLibrary:
    handler: functions/library/list.handler
    events:
      - httpApi:
          path: /library
          method: GET
          authorizer:
            name: jwtAuthorizer

  # Library browser (public — live from Radarr/Sonarr)
  libraryMovies:
    handler: functions/library/movies.handler
    timeout: 30
    events:
      - httpApi:
          path: /library/movies
          method: GET

  libraryShows:
    handler: functions/library/shows.handler
    timeout: 30
    events:
      - httpApi:
          path: /library/shows
          method: GET

  libraryShowEpisodes:
    handler: functions/library/episodes.handler
    events:
      - httpApi:
          path: /library/shows/{sonarrId}/episodes
          method: GET

  # Library sync (scheduled)
  syncLibrary:
    handler: functions/library/sync.handler
    timeout: 120
    memorySize: 512
    events:
      - schedule:
          rate: rate(15 minutes)
          enabled: true

  # Download status (authenticated)
  requestDownloadStatus:
    handler: functions/requests/downloadStatus.handler
    events:
      - httpApi:
          path: /requests/download-status
          method: GET
          authorizer:
            name: jwtAuthorizer

  adminRequestDownloadStatus:
    handler: functions/admin/requests/downloadStatus.handler
    events:
      - httpApi:
          path: /admin/requests/download-status
          method: GET
          authorizer:
            name: jwtAuthorizer

  # Auto-sync request status (scheduled)
  syncRequestStatus:
    handler: functions/requests/syncStatus.handler
    timeout: 60
    events:
      - schedule:
          rate: rate(5 minutes)
          enabled: true

  # Admin issues
  adminListIssues:
    handler: functions/admin/issues/list.handler
    events:
      - httpApi:
          path: /admin/issues
          method: GET
          authorizer:
            name: jwtAuthorizer

  adminUpdateIssueStatus:
    handler: functions/admin/issues/updateStatus.handler
    events:
      - httpApi:
          path: /admin/issues/{id}/status
          method: PUT
          authorizer:
            name: jwtAuthorizer

  adminDeleteIssue:
    handler: functions/admin/issues/delete.handler
    events:
      - httpApi:
          path: /admin/issues/{id}
          method: DELETE
          authorizer:
            name: jwtAuthorizer

resources:
  Resources:
    # DynamoDB Tables
    RequestsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.REQUESTS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: requestId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
          - AttributeName: status
            AttributeType: S
          - AttributeName: requestedAt
            AttributeType: S
        KeySchema:
          - AttributeName: requestId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: UserIndex
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: requestedAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: StatusIndex
            KeySchema:
              - AttributeName: status
                KeyType: HASH
              - AttributeName: requestedAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    SettingsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SETTINGS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: settingKey
            AttributeType: S
        KeySchema:
          - AttributeName: settingKey
            KeyType: HASH

    IssuesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.ISSUES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: issueId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
          - AttributeName: status
            AttributeType: S
          - AttributeName: reportedAt
            AttributeType: S
        KeySchema:
          - AttributeName: issueId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: UserIssueIndex
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: reportedAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: StatusIssueIndex
            KeySchema:
              - AttributeName: status
                KeyType: HASH
              - AttributeName: reportedAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    LibraryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.LIBRARY_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    # Cognito User Pool
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${self:provider.stage}-user-pool
        AutoVerifiedAttributes:
          - email
        UsernameAttributes:
          - email
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireUppercase: true
            RequireNumbers: true
            RequireSymbols: false
        Schema:
          - Name: email
            Required: true
            Mutable: true
          - Name: name
            Required: false
            Mutable: true

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-${self:provider.stage}-client
        UserPoolId: !Ref CognitoUserPool
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_SRP_AUTH
        GenerateSecret: false
        AccessTokenValidity: 1
        IdTokenValidity: 1
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: hours
          IdToken: hours
          RefreshToken: days

    CognitoAdminGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: admins
        UserPoolId: !Ref CognitoUserPool
        Description: Admin users with elevated privileges

    # S3 Bucket for Frontend
    FrontendBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${self:provider.stage}-frontend
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

    FrontendBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref FrontendBucket
        PolicyDocument:
          Statement:
            - Sid: AllowCloudFrontAccess
              Effect: Allow
              Principal:
                Service: cloudfront.amazonaws.com
              Action: s3:GetObject
              Resource: !Sub ${FrontendBucket.Arn}/*
              Condition:
                StringEquals:
                  AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

    # CloudFront Origin Access Control
    CloudFrontOAC:
      Type: AWS::CloudFront::OriginAccessControl
      Properties:
        OriginAccessControlConfig:
          Name: ${self:service}-${self:provider.stage}-oac
          OriginAccessControlOriginType: s3
          SigningBehavior: always
          SigningProtocol: sigv4

    # CloudFront Distribution
    CloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          DefaultRootObject: index.html
          Origins:
            - DomainName: !GetAtt FrontendBucket.RegionalDomainName
              Id: S3Origin
              OriginAccessControlId: !GetAtt CloudFrontOAC.Id
              S3OriginConfig:
                OriginAccessIdentity: ''
          DefaultCacheBehavior:
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            Compress: true
          CustomErrorResponses:
            - ErrorCode: 403
              ResponseCode: 200
              ResponsePagePath: /index.html
              ErrorCachingMinTTL: 0
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html
              ErrorCachingMinTTL: 0

  Outputs:
    CognitoUserPoolId:
      Value: !Ref CognitoUserPool
      Description: Cognito User Pool ID

    CognitoUserPoolClientId:
      Value: !Ref CognitoUserPoolClient
      Description: Cognito User Pool Client ID

    ApiUrl:
      Value: !Sub https://${HttpApi}.execute-api.${self:provider.region}.amazonaws.com/${self:provider.stage}
      Description: API Gateway URL

    FrontendBucketName:
      Value: !Ref FrontendBucket
      Description: Frontend S3 bucket name

    CloudFrontDomainName:
      Value: !GetAtt CloudFrontDistribution.DomainName
      Description: CloudFront distribution domain name

    CloudFrontDistributionId:
      Value: !Ref CloudFrontDistribution
      Description: CloudFront distribution ID
